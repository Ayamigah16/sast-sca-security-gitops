# =============================================================================
# SonarCloud scanner configuration
#
# The scanner runs inside Docker in the Jenkins SAST — SonarCloud stage.
# These properties are the static defaults; dynamic values (projectVersion,
# sonar.host.url, sonar.token) are injected by the pipeline via the
# withSonarQubeEnv() Jenkins plugin binding.
#
# Jenkins server entry (one-time setup):
#   Manage Jenkins → Configure System → SonarQube servers
#   Name: SonarCloud
#   URL:  https://sonarcloud.io
#   Token credential ID: sonar-auth-token  (SonarCloud user token)
# =============================================================================

# ---------------------------------------------------------------------------
# SonarCloud organisation
# Must match the organisation key shown in SonarCloud → My Account →
# Organisations.  Required for SonarCloud (not used by self-hosted SonarQube).
# ---------------------------------------------------------------------------
sonar.organization=ayamigah16

# ---------------------------------------------------------------------------
# Project identity
# Must match the project key created in the SonarQube UI (or auto-created
# on first scan).  The Jenkins pipeline passes `sonar.projectVersion` as
# the build number so every scan is traceable to a specific Jenkins build.
# ---------------------------------------------------------------------------
sonar.projectKey=ayamigah16_secure-flask-app
sonar.projectName="Secure Flask App"

# ---------------------------------------------------------------------------
# Source layout
# ---------------------------------------------------------------------------
sonar.sources=app
sonar.tests=tests
sonar.python.version=3

# ---------------------------------------------------------------------------
# Imported reports
#
# SonarQube imports these pre-generated artefacts instead of re-running the
# tools itself, which keeps the scan fast and ensures CI/CD tool versions
# are the single source of truth.
#
#   coverage.xml — pytest-cov XML, maps line coverage onto the source view.
# ---------------------------------------------------------------------------
sonar.python.coverage.reportPaths=reports/coverage.xml

# ---------------------------------------------------------------------------
# Exclusions
# ---------------------------------------------------------------------------
# Files that should not be analysed (compiled artefacts, migrations, etc.)
sonar.exclusions=\
  **/__pycache__/**,\
  **/*.pyc,\
  **/*.pyo,\
  **/.venv/**,\
  **/venv/**,\
  app/Dockerfile,\
  infra/**,\
  reports/**

# Files excluded from coverage measurement (test helpers are not production
# code and skewing the metric down would be misleading)
sonar.coverage.exclusions=\
  tests/**,\
  **/__init__.py

# ---------------------------------------------------------------------------
# Quality Gate behaviour
#
# sonar.qualitygate.wait=true  — the scanner blocks until the server has
# computed the Quality Gate result and exits non-zero on failure.  This
# gives the Jenkins stage a definitive pass/fail without needing a webhook.
# ---------------------------------------------------------------------------
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
